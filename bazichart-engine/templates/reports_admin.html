{% extends "base.html" %}
{% block title %}报告管理 — 龙虾AI{% endblock %}

{% block content %}
<div class="px-4 py-8" style="max-width: 1180px; margin: 0 auto;" x-data="reportsAdminApp()" x-init="init()">
  <div class="mb-8">
    <div class="section-label mb-4">管理后台 / 报告管理</div>
    <h1 class="font-serif-sc" style="font-size: 36px;">报告导航管理与社区审核</h1>
  </div>

  <div class="grid gap-6 lg:grid-cols-[0.95fr_1.05fr]">
    <section class="card p-6">
      <div class="flex items-center justify-between mb-5">
        <h2 style="font-size: 22px; color: var(--text-primary);">添加导航报告</h2>
      </div>
      <div class="space-y-4">
        <input x-model="form.title" placeholder="标题" />
        <input x-model="form.source_org" placeholder="机构" />
        <input x-model="form.source_url" placeholder="原文链接" />
        <input x-model="form.publish_date" placeholder="发布日期，如 2026-01-01" />
        <input x-model="form.report_type" placeholder="类型，如 年度展望" />
        <input x-model="form.industry_tags" placeholder="行业标签，逗号分隔" />
        <input x-model="form.region_tags" placeholder="区域标签，逗号分隔" />
        <textarea x-model="form.summary" placeholder="摘要，100字以内" style="width:100%; min-height:120px; background-color: var(--bg-card); color: var(--text-primary); border: 1px solid #333355; border-radius: 8px; padding: 10px 14px;"></textarea>
        <label class="flex items-center gap-3" style="color: var(--text-secondary);">
          <input type="checkbox" x-model="form.is_featured" style="width:auto;">
          <span>设为精选</span>
        </label>
        <button @click="createReport()" class="btn-accent">保存报告</button>
      </div>
    </section>

    <section class="space-y-6">
      <div class="card p-6">
        <h2 style="font-size: 22px; color: var(--text-primary);">社区待审核</h2>
        <div class="space-y-4 mt-5">
          <template x-for="report in pendingReports" :key="report.id">
            <div class="card p-5" style="border: 1px solid rgba(255,255,255,0.06);">
              <div class="flex flex-col gap-3 md:flex-row md:justify-between">
                <div>
                  <div style="font-size: 18px; color: var(--text-primary);" x-text="report.title"></div>
                  <p class="mt-2" style="color: var(--text-muted); font-size: 14px;">
                    上传者：<span x-text="report.uploader_nickname"></span>
                    <span> · </span>
                    <span x-text="report.uploader_email"></span>
                    <span> · </span>
                    <span x-text="report.file_size"></span>
                  </p>
                  <p class="mt-3" style="color: var(--text-secondary);" x-text="report.notes || '无备注'"></p>
                </div>
                <div class="flex flex-wrap md:flex-col gap-3 md:items-end">
                  <a :href="'/api/v2/admin/shared-reports/' + report.id + '/download'" class="btn-accent" style="padding: 10px 16px;">预览/下载</a>
                  <button @click="approve(report.id)" class="card px-4 py-2" style="color: #9ae6b4;">通过</button>
                  <button @click="reject(report.id)" class="card px-4 py-2" style="color: #ffae66;">拒绝</button>
                  <button @click="remove(report.id)" class="card px-4 py-2" style="color: #ff9b9b;">下架</button>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>

      <div class="card p-6">
        <h2 style="font-size: 22px; color: var(--text-primary);">导航报告列表</h2>
        <div class="space-y-4 mt-5">
          <template x-for="report in reports" :key="'admin-' + report.id">
            <div class="flex items-center justify-between gap-4 pb-4" style="border-bottom: 1px solid rgba(255,255,255,0.06);">
              <div>
                <div style="color: var(--text-primary);" x-text="report.title"></div>
                <div class="mt-1" style="color: var(--text-muted); font-size: 13px;" x-text="report.source_org + ' · 点击 ' + report.click_count"></div>
              </div>
              <button @click="deleteReport(report.id)" class="card px-4 py-2" style="color: #ff9b9b;">删除</button>
            </div>
          </template>
        </div>
      </div>
    </section>
  </div>
</div>

<script>
function reportsAdminApp() {
  return {
    form: { title: '', source_org: '', source_url: '', publish_date: '', report_type: '', industry_tags: '', region_tags: '', summary: '', is_featured: false },
    reports: [],
    pendingReports: [],

    async init() {
      await this.loadReports();
      await this.loadPending();
    },

    adminHeaders() {
      return { 'Content-Type': 'application/json' };
    },

    splitTags(value) {
      return (value || '').split(/[,，]/).map(item => item.trim()).filter(Boolean);
    },

    async loadReports() {
      const resp = await fetch('/api/v2/industry-reports?limit=50');
      const data = await resp.json();
      this.reports = data.items || [];
    },

    async loadPending() {
      const resp = await fetch('/api/v2/admin/shared-reports/pending');
      this.pendingReports = resp.ok ? await resp.json() : [];
    },

    async createReport() {
      const payload = {
        title: this.form.title,
        source_org: this.form.source_org,
        source_url: this.form.source_url,
        publish_date: this.form.publish_date,
        report_type: this.form.report_type,
        industry_tags: this.splitTags(this.form.industry_tags),
        region_tags: this.splitTags(this.form.region_tags),
        summary: this.form.summary,
        is_featured: !!this.form.is_featured
      };
      const resp = await fetch('/api/v2/admin/industry-reports', {
        method: 'POST',
        headers: this.adminHeaders(),
        body: JSON.stringify(payload)
      });
      if (!resp.ok) return;
      this.form = { title: '', source_org: '', source_url: '', publish_date: '', report_type: '', industry_tags: '', region_tags: '', summary: '', is_featured: false };
      await this.loadReports();
    },

    async deleteReport(id) {
      if (!confirm('确认删除导航报告？')) return;
      const resp = await fetch(`/api/v2/admin/industry-reports/${id}`, { method: 'DELETE' });
      if (resp.ok) await this.loadReports();
    },

    async approve(id) {
      const resp = await fetch(`/api/v2/admin/shared-reports/${id}/approve`, { method: 'POST' });
      if (resp.ok) await this.loadPending();
    },

    async reject(id) {
      const reason = prompt('请输入拒绝原因');
      if (reason === null) return;
      const resp = await fetch(`/api/v2/admin/shared-reports/${id}/reject`, {
        method: 'POST',
        headers: this.adminHeaders(),
        body: JSON.stringify({ reason })
      });
      if (resp.ok) await this.loadPending();
    },

    async remove(id) {
      const resp = await fetch(`/api/v2/admin/shared-reports/${id}`, { method: 'DELETE' });
      if (resp.ok) await this.loadPending();
    }
  }
}
</script>
{% endblock %}
